name: Validate Homebrew Submissions

on:
  pull_request:
    paths:
      - 'submissions/**'
  workflow_dispatch:  # Allow manual trigger from the Actions tab

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Validate submissions
        run: node ./tools/validate-submissions.mjs
